<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
<script src="https://code.jquery.com/jquery-1.10.2.js"></script>
<script src="js/load-home.js"></script>
<script defer src="../js/animation.js"></script>

<!-- Fonts and Stylesheets -->
<head><link href="https://fonts.googleapis.com/css?family=Lato|Source+Sans+Pro|VT323|Libre+Baskerville&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">

<!-- Title -->
<title>Lillian Horin | Scientific & Visual Storyteller</title>
</head>

<!-- Body -->
<body id="home">

<!-- Navigation -->
<nav><div id="nav"></div></nav>

<main class="main-content">
	

<main>
    <!-- Photography -->
    <section class="gallery">
        <div class="photo-grid" id="photo-grid">
            <p class="gallery-loading">Loading photos…</p>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" aria-hidden="true">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-arrow left">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img" src="" alt="">
        <button class="lightbox-arrow right">&#10095;</button>
    </div>
	
</main>
	

<!-- Footer -->
<hr class="style" id="last">
	
<div id="footer"></div>

</body>
</html>
