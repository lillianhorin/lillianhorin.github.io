<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
	<header class="navigation">
		<div class="container nav-container">
			<a href="/" id="name">lillian horin</a>
			<nav class="nav-wrapper">
				<ul class="nav">
                    <!-- Photography group: label + always-visible sub-items -->
                    <li class="nav-group">
                        <span class="item group-label">Photography</span>
                        <a href="/" class="item sub-item">Stills</a>
                        <a href="/photography/stories/" class="item sub-item">Stories</a>
                    </li>
					<li><a href="/work/" class="item">Work</a></li>
					<li><a href="/resume/" class="item">Resume</a></li>
					<li><a href="/about/" class="item">About</a></li>
					<li><button id="theme-toggle">🌕</button></li>
				</ul>
			</nav>
		</div>

	</header>

    <!-- JavaScript for active link highlighting -->
	<script>
		document.querySelectorAll('.nav li a').forEach(link => {
			// Define a map of links and their possible paths
			const pathMap = {
                "/": ["/", "/index.html"],
                "/photography/stories/": ["/photography/stories/", "/photography/stories/index.html"],
                "/work/": ["/work/", "/work/index.html"],
                "/resume/": ["/resume/", "/resume/index.html"],
                "/about/": ["/about/", "/about/index.html"],
            };

			// Get the href path of the current link
            const linkPath = link.getAttribute("href");
            if (pathMap[linkPath] && pathMap[linkPath].includes(window.location.pathname)) {
                link.classList.add('active');
            }
        });
    </script>

<!-- JavaScript for theme toggle -->
<script src="/js/theme-toggle.js"></script>
</body>
</html>
