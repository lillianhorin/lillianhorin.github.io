<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
	<header class="navigation">
		<div class="container nav-container">
			<a href="/" id="name">lillian horin</a>
			<nav class="nav-wrapper">
				<ul class="nav">
					<li><a href="/" class="item">Home</a></li>
                    <!-- Photography dropdown -->
                    <li class="has-dropdown">
                        <a href="/photography/" class="item dropdown-toggle">Photography</a>
                        <ul class="dropdown">
                            <li><a href="/photography/stills/">Stills</a></li>
                            <li><a href="/photography/stories/">Stories</a></li>
                        </ul>
                    </li>
					<li><a href="/work/" class="item">Work</a></li> 
					<li><a href="/resume/" class="item">Resume</a></li>
					<li><a href="/about/" class="item">About</a></li>
					<li><button id="theme-toggle">🌕</button></li>
				</ul>
			</nav>
		</div>
		
	</header>

    <!-- JavaScript for active link highlighting -->
	<script>
		document.querySelectorAll('.nav li a').forEach(link => {
			// Define a map of links and their possible paths
			const pathMap = {
                "/": ["/", "/index.html"],
                "/photography/stills/": ["/photography/stills/", "/photography/stills/index.html"],
                "/photography/stories/": ["/photography/stories/", "/photography/stories/index.html"],
                "/work/": ["/work/", "/work/index.html"],
                "/resume/": ["/resume/", "/resume/index.html"],
                "/about/": ["/about/", "/about/index.html"],
            };
	
			// Get the href path of the current link
            const linkPath = link.getAttribute("href");
            if (pathMap[linkPath] && pathMap[linkPath].includes(window.location.pathname)) {
                link.classList.add('active');
 
                // Also highlight the parent "Photography" toggle if a sub-page is active
                const parentLi = link.closest('.dropdown')?.closest('.has-dropdown');
                if (parentLi) {
                    parentLi.querySelector('.dropdown-toggle').classList.add('active');
                }
            }
        });
    </script>

	<!-- Dropdown: toggle on click for mobile -->
    <script>
        document.querySelectorAll('.dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', function (e) {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    e.preventDefault(); // don't navigate on mobile — just open dropdown
                    const parentLi = this.closest('.has-dropdown');
                    parentLi.classList.toggle('open');
                }
            });
        });
 
        // Close dropdown if user clicks outside
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.has-dropdown')) {
                document.querySelectorAll('.has-dropdown').forEach(el => el.classList.remove('open'));
            }
        });
    </script>


<!-- JavaScript for theme toggle -->
<script src="/js/theme-toggle.js"></script>
</body>
</html>
